name: API Gateway CI/CD Pipeline



on:
  push:
    paths:
      - backend/api-gateway/**
    branches:
      - "**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      working-directory: ./backend/api-gateway
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/csc8113bookstore-api-gateway
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          chmod +x ../mvnw
          ../mvnw -ntp verify

      - if: ${{ github.ref == 'refs/heads/backend' }}
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: ${{ github.ref == 'refs/heads/backend' }}
        name: Build and Push Docker Image
        run: |
        
          COMMIT_HASH=${GITHUB_SHA:0:7}
          
          ../mvnw spring-boot:build-image -Dspring-boot.build-image.imageName=${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH -DskipTests
          
          docker push ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH
          
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH ${{ env.DOCKER_IMAGE_NAME }}:latest
          
   
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest