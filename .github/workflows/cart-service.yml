name: Cart Service CI/CD Pipeline
on:
    push:
        paths:
          - cart-service/**
        branches:
          - "**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
        working-directory: ./cart-service
        DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/csc8113bookstore-cart-service
    defaults:
        run:
            working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'maven'

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw -ntp verify