name: Frontend CI/CD Pipeline

on:
  push:
    paths:
      - front-end/**
    branches:
      - "**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      working-directory: ./front-end
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/csc8113bookstore-frontend
    defaults:
      run:
        working-directory: ${{ env.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - if: ${{ github.ref == 'refs/heads/frontend' }}
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: ${{ github.ref == 'refs/heads/frontend' }}
        name: Build and Push Docker Image
        run: |
          COMMIT_HASH=${GITHUB_SHA:0:7}

          docker build \
            -t ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH \
            .

          docker push ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH

          docker tag ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH ${{ env.DOCKER_IMAGE_NAME }}:latest

          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
