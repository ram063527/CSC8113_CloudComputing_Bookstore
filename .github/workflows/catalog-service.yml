name: Catalog Service CI/CD Pipeline



on:
  push:
    branches:
      - main
    paths:
      - backend/catalog-service/**
  pull_request:
    branches:
      - main
    paths:
      - backend/catalog-service/**


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      working-directory: ./backend/catalog-service
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/csc8113bookstore-catalog-service
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'maven'

      - name: Build with Maven
        run: |
          chmod +x ../mvnw
          ../mvnw -ntp verify

      - if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        name: Build and Push Docker Image
        run: |
          
          COMMIT_HASH=${GITHUB_SHA:0:7}
          
          ../mvnw spring-boot:build-image -DskipTests -DdockerImageName=${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH
          
          docker push ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH
          
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:$COMMIT_HASH ${{ env.DOCKER_IMAGE_NAME }}:latest
          
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
