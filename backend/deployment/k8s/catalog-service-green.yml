apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
      color: green
  template:
    metadata:
      labels:
        app: catalog-service
        color: green
    spec:
      containers:
        - name: catalog-service
          # Grabbing  brand new specific Git hash!
          image: paritosh4495/csc8113bookstore-catalog-service:0706708
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_URL
              value: "jdbc:postgresql://postgres-db:5432/catalog"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://localhost:9191/realms/mylabs"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak:9191/realms/mylabs/protocol/openid-connect/certs"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "700Mi"
              cpu: "1000m"