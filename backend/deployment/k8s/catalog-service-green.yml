apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
      color: green
  template:
    metadata:
      labels:
        app: catalog-service
        color: green
    spec:
      containers:
        - name: catalog-service
          # Grabbing  brand new specific Git hash!
          image: paritosh4495/csc8113bookstore-catalog-service:ce09212
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_URL
              value: "jdbc:postgresql://postgres-db:5432/catalog"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://keycloak:9191/realms/mylabs"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak:9191/realms/mylabs/protocol/openid-connect/certs"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "700Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: "/actuator/health/liveness"
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 20
