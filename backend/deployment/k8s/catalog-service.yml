---
# 1. The Service: Creates the internal network address 'catalog-service'
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8081
      targetPort: 8081

---
# 2. The Deployment: Manages the Spring Boot Pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          # Grabbing the image your GitHub Action just pushed!
          image: paritosh4495/csc8113bookstore-catalog-service:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_URL
              value: "jdbc:postgresql://postgres-db:5432/catalog"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            # The exact same JWT magic split we used in Docker Compose
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://localhost:9191/realms/mylabs"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak:9191/realms/mylabs/protocol/openid-connect/certs"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "700Mi"
              cpu: "1000m"